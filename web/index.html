<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  
  <meta http-equiv="Content-Security-Policy" content="frame-src 'self' https://meet.ffmuc.net">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="afrinova_academy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>afrinova_academy</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script src="https://meet.ffmuc.net/external_api.js"></script>

  <script>
    // Create a promise that resolves when Jitsi API is ready
    let jitsiApiReadyPromise = new Promise((resolve) => {
      window.onJitsiExternalAPIReady = function() {
        console.log('✓ Jitsi API Ready');
        resolve();
      };
    });

   window.createJitsiMeeting = function(
    roomName,
    userName,
    containerId
) {

    const waitForContainer = () => {

        const container =
            document.getElementById(containerId);

        if (!container) {

            console.log(
                "Waiting for container..."
            );

            setTimeout(
                waitForContainer,
                200
            );

            return;
        }

        console.log(
            "Container found!"
        );

        window.afriNovaApi =
            new JitsiMeetExternalAPI(
                'meet.ffmuc.net',
                {
                    roomName: roomName,
                    parentNode: container,
                    width: '100%',
                    height: '100%',
                    userInfo: {
                        displayName: userName
                    }
                }
            );
    };

    waitForContainer();
};
    window.disposeJitsiMeeting = function() {
      if (window.afriNovaApi) {
        try {
          window.afriNovaApi.dispose();
          window.afriNovaApi = null;
          console.log('✓ Jitsi meeting disposed');
        } catch (e) {
          console.error('Error disposing Jitsi:', e);
        }
      }
    };
  </script>
</body>
</html>
